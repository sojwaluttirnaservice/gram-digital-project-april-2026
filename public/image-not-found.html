<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 - Image Not Found</title>
        <style>
            body {
                background-color: #f9f9f9;
                color: #333;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                text-align: center;
                padding: 20px;
            }

            h1 {
                font-size: 5rem;
                margin: 0;
                color: #e74c3c;
            }

            p {
                font-size: 1.5rem;
                margin: 10px 0 30px;
            }

            .illustration {
                width: 250px;
                max-width: 100%;
                margin-bottom: 30px;
            }

            .button {
                padding: 12px 24px;
                background-color: #3498db;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 1rem;
                cursor: pointer;
                text-decoration: none;
                transition: background-color 0.3s ease;
            }

            .button:hover {
                background-color: #2980b9;
            }
        </style>
    </head>
    <body>
        <img
            src="https://cdn-icons-png.flaticon.com/512/2748/2748558.png"
            alt="Image Not Found"
            class="illustration" />
        <h1>404</h1>
        <p>Oops! The image you're looking for doesn't exist.</p>
        <a href="/" class="button">Go Home</a>
    </body>
</html>
